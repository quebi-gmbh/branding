name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm run build:clean

      - run: node scripts/package.mjs

      - run: pnpm run test

      - name: Upload dist/
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 14
